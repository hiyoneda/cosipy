threeml_source_models:
  grbdc3 (point source): &grbdc3_source_model
      position:

        l:

          value: 177.42

          desc: Galactic longitude

          min_value: 0.0

          max_value: 360.0

          unit: deg

          is_normalization: false

          delta: 17.742

          free: false

        b:

          value: -9.41

          desc: Galactic latitude

          min_value: -90.0

          max_value: 90.0

          unit: deg

          is_normalization: false

          delta: 0.9410000000000001

          free: false

        equinox: J2000

      spectrum:

        main:

          Band:

            K:

              value: 0.1

              desc: Differential flux at the pivot energy

              min_value: 1.0e-10

              max_value: 1

              unit: keV-1 s-1 cm-2

              is_normalization: true

              delta: 1.0e-05

              free: true

            alpha:

              value: -1.0

              desc: low-energy photon index

              min_value: -1.5

              max_value: 3.0

              unit: ''

              is_normalization: false

              delta: 0.1

              free: true

            xp:

              value: 300.0000000000001

              desc: peak in the x * x * N (nuFnu if x is a energy)

              min_value: 10.0

              max_value: null

              unit: keV

              is_normalization: false

              delta: 50.0

              free: true

            beta:

              value: -2.0

              desc: high-energy photon index

              min_value: -5.0

              max_value: -1.6

              unit: ''

              is_normalization: false

              delta: 0.2

              free: true

            piv:

              value: 500.0

              desc: pivot energy

              min_value: 100

              max_value: 1000

              unit: keV

              is_normalization: false

              delta: 10.0

              free: false

          polarization: {}


